<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement - Néo Pizza</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Ajout de Font Awesome pour les icônes (optionnel mais recommandé) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .resto-info {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            width: 100%;
            max-width: 500px;
        }

        .resto-info h1 {
            font-size: 2.5em;
            color: #c72a2a;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .resto-info p {
            font-size: 1.2em;
            color: #555;
        }

        .total {
            background: #fff;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            border: 2px solid #ff9900;
        }

        .total span {
            font-size: 1.2em;
            color: #666;
            display: block;
            margin-bottom: 10px;
        }

        .total strong {
            font-size: 2.5em;
            color: #c72a2a;
            display: block;
            line-height: 1.2;
        }

        .total small {
            font-size: 0.9em;
            color: #999;
        }

        .paiement-options {
            width: 100%;
            max-width: 500px;
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .option {
            background: #f8f9fa;
            border: 2px solid transparent;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .option:hover {
            border-color: #ff9900;
            background: #fff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .option input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border: 2px solid #ddd;
            border-radius: 50%;
            margin: 0;
            position: relative;
            transition: all 0.2s;
        }

        .option input[type="radio"]:checked {
            border-color: #c72a2a;
            background-color: #c72a2a;
            box-shadow: inset 0 0 0 5px white;
        }

        .option input[type="radio"]:focus {
            outline: none;
        }

        .option label {
            flex: 1;
            font-size: 1.1em;
            cursor: pointer;
            color: #333;
        }

        .option label strong {
            color: #c72a2a;
            display: block;
            font-size: 1.2em;
            margin-bottom: 5px;
        }

        .option label small {
            color: #777;
            font-size: 0.9em;
            display: block;
        }

        .option i {
            font-size: 2.5em;
            color: #ff9900;
            width: 50px;
            text-align: center;
        }

        .btn-confirmer {
            background: linear-gradient(135deg, #c72a2a 0%, #a02020 100%);
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.3em;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(199, 42, 42, 0.3);
        }

        .btn-confirmer:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(199, 42, 42, 0.4);
            background: linear-gradient(135deg, #a02020 0%, #c72a2a 100%);
        }

        footer {
            margin-top: 30px;
            color: rgba(255,255,255,0.8);
            text-align: center;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            .resto-info, .total, .paiement-options {
                max-width: 100%;
            }
            .option i {
                font-size: 2em;
                width: 40px;
            }
        }

        /* Animation d'entrée */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .resto-info, .total, .paiement-options, footer {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .total { animation-delay: 0.1s; }
        .paiement-options { animation-delay: 0.2s; }
        footer { animation-delay: 0.3s; }
    </style>
</head>
<body>
    <div class="resto-info">
        <h1>🍕 Néo Pizza</h1>
        <p>Choisissez votre méthode de paiement</p>
    </div>

    <div class="total">
        <span>Total à payer</span>
        <strong>{{ commande['total'] }} FCFA</strong>
        <small>Paiement sécurisé</small>
    </div>

    <form action="/payer" method="post" class="paiement-options">
        <input type="hidden" name="commande_id" value="{{ commande['id'] }}">

        <!-- Option PAYTECH -->
        <div class="option" onclick="document.getElementById('paytech').checked = true;">
            <i class="fas fa-mobile-alt"></i>
            <input type="radio" name="mode" value="paytech" id="paytech" required>
            <label for="paytech">
                <strong>PAYTECH</strong>
                <small>Orange Money, Wave, Free Money</small>
            </label>
        </div>

        <!-- Option Espèces -->
        <div class="option" onclick="document.getElementById('cash').checked = true;">
            <i class="fas fa-money-bill-wave"></i>
            <input type="radio" name="mode" value="especes" id="cash">
            <label for="cash">
                <strong>Espèces</strong>
                <small>Paiement à la caisse</small>
            </label>
        </div>

        <button type="submit" class="btn-confirmer">
            <i class="fas fa-lock" style="margin-right: 10px;"></i> Confirmer le paiement
        </button>
    </form>

    <footer>
        <p>Néo Pizza - Guédiawaye | Paiement 100% sécurisé</p>
    </footer>
</body>
</html>
